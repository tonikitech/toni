name: Deploy to Pages

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install dependencies
      working-directory: ./ai-news-blog
      run: npm install
    
    - name: Generate news
      working-directory: ./ai-news-blog
      run: npm start
    
    - name: Prepare docs folder
      run: |
        mkdir -p docs
        rm -rf docs/*
        cp ai-news-blog/public/index.html docs/
        cp .nojekyll docs/
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: 'docs'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2

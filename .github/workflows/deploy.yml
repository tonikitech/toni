name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Build
      run: |
        cd ai-news-blog
        npm install
        npm start
    
    - name: Prepare docs
      run: |
        rm -rf docs
        mkdir -p docs
        cp ai-news-blog/public/index.html docs/
        cp -r ai-news-blog/public/*.css docs/ 2>/dev/null || true
        cp -r ai-news-blog/public/*.js docs/ 2>/dev/null || true
    
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        cname: toni-ki.tech
